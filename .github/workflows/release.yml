on:
  push:
    branches:
      - main
      - release

jobs:
  R-build:
    strategy:
      fail-fast: false
      matrix:
        R: [ '4.4.1' ]
        os: [ 'macos-15-intel', 'macos-latest', 'ubuntu-latest' ]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.R }} ${{ matrix.os }} build
    env:
      R_LIBS: ${{ github.workspace }}/Rlibs

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.R }}
    - name: System Dependencies
      if: startsWith( matrix.os, 'ubuntu' )
      run: |
        sudo apt-get -y update &&
        sudo apt-get install -y libcurl4-openssl-dev libssh2-1-dev libharfbuzz-dev libfribidi-dev gh &&
        sudo rm -rf /var/lib/apt/lists/*
    - name: Configuration Information
      run: |
        mkdir ${R_LIBS}
        c++ --version
        cmake --version
        which R
        R --version
    - name: Install R packages
      run: |
        R -e "install.packages(c('remotes', 'desc'), lib=c('${R_LIBS}'), repo='https://cloud.r-project.org/')"
    - name: Make source
      if: runner.os == 'Linux'
      run: |
        set -x
        R CMD build . --no-manual
      env:
        ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    - name: Make binary
      if: runner.os == 'macOS'
      run: |
        set -x
        R CMD INSTALL --build -l ${R_LIBS} --configure-vars='MAKEJ=8' .
      env:
        ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p dist
        mv *.zip *.tgz *.tar.gz dist/ 2>/dev/null || true
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: r-${{ matrix.os }}-${{ matrix.R }}
        path: dist/*
  R-build-win:
    strategy:
      fail-fast: false
      matrix:
        R: [ '4.4.1' ]
        os: ['windows-latest' ]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.R }} ${{ matrix.os }} build
    env:
      R_LIBS: ${{ github.workspace }}/Rlibs
      ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
        
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.R }}
        rtools-version: '44'
        
    - name: Configuration Information (win)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "$env:R_LIBS" | Out-Null
        g++ --version
        cmake --version
        Get-Command R.exe
        R.exe --version
        
    - name: Install R packages (Windows)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        Rscript -e "lib <- Sys.getenv('R_LIBS'); lib <- normalizePath(lib, winslash='/', mustWork=FALSE); dir.create(lib, recursive=TRUE, showWarnings=FALSE); install.packages('remotes', lib=lib, repos='https://cloud.r-project.org/')"
        Rscript.exe -e "install.packages(c('remotes'), repos='https://cloud.r-project.org/')"

    - name: Build and test (Windows)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      env:
        ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
      run: |
        # Rscript -e "lib <- Sys.getenv('R_LIBS'); remotes::install_git('.', lib=lib, configure.vars=c('MAKEJ=2'))"
        # Rscript.exe  -e "remotes::install_git('.')"
        Rcmd.exe INSTALL --build --configure-vars='MAKEJ=8' .
    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p dist
        mv *.zip *.tgz *.tar.gz dist/ 2>/dev/null || true
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: r-${{ matrix.os }}-${{ matrix.R }}
        path: dist/*