on:
  push:
    branches:
      - main
      - release

jobs:
  prepare-release:
    name: Prepare draft release
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.meta.outputs.package }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          
      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="$(Rscript -e 'x <- read.dcf("DESCRIPTION"); cat(x[1,"Package"])')"
          VERSION="$(Rscript -e 'x <- read.dcf("DESCRIPTION"); cat(x[1,"Version"])')"

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          PACKAGE: ${{ steps.meta.outputs.package }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            IS_DRAFT="$(gh api "repos/$REPO/releases/tags/$TAG" --jq '.draft')"

            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $TAG already exists and is published; refusing to overwrite it."
              exit 1
            fi

            git tag -f "$TAG" "$SHA"
            git push --force origin "refs/tags/$TAG"

            gh release edit "$TAG" \
              --repo "$REPO" \
              --title "${PACKAGE} ${TAG}"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --target "$SHA" \
              --draft \
              --title "${PACKAGE} ${TAG}" \
              --notes "Automated draft release for ${PACKAGE} ${TAG}"
          fi
          
  R-build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        R: [ '4.5.2' ]
        os: [ 'macos-15-intel', 'ubuntu-latest' ]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.R }} ${{ matrix.os }} build
    env:
      R_LIBS: ${{ github.workspace }}/Rlibs

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.R }}
    - name: System Dependencies
      if: startsWith( matrix.os, 'ubuntu' )
      run: |
        sudo apt-get -y update &&
        sudo apt-get install -y libcurl4-openssl-dev libssh2-1-dev libharfbuzz-dev libfribidi-dev gh &&
        sudo rm -rf /var/lib/apt/lists/*
    - name: Configuration Information
      run: |
        mkdir ${R_LIBS}
        c++ --version
        cmake --version
        which R
        R --version
    - name: Install R packages
      run: |
        R -e "install.packages(c('remotes', 'desc'), lib=c('${R_LIBS}'), repo='https://cloud.r-project.org/')"
    - name: Make source
      if: runner.os == 'Linux'
      run: |
        set -x
        R CMD build . --no-manual
      env:
        ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    - name: Make binary
      if: runner.os == 'macOS'
      run: |
        set -x
        R CMD INSTALL --build -l ${R_LIBS} --configure-vars='MAKEJ=8' .
      env:
        ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p dist
        mv *.zip *.tgz *.tar.gz dist/ 2>/dev/null || true
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: r-${{ matrix.os }}-${{ matrix.R }}
        path: dist/*
  R-build-win:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        R: [ '4.5.2' ]
        os: ['windows-latest' ]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.R }} ${{ matrix.os }} build
    env:
      R_LIBS: ${{ github.workspace }}/Rlibs
      ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
        
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.R }}
        rtools-version: '44'
        
    - name: Configuration Information (win)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "$env:R_LIBS" | Out-Null
        g++ --version
        cmake --version
        Get-Command R.exe
        R.exe --version
        
    - name: Install R packages (Windows)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        Rscript -e "lib <- Sys.getenv('R_LIBS'); lib <- normalizePath(lib, winslash='/', mustWork=FALSE); dir.create(lib, recursive=TRUE, showWarnings=FALSE); install.packages('remotes', lib=lib, repos='https://cloud.r-project.org/')"
        Rscript.exe -e "install.packages(c('remotes', 'desc'), repos='https://cloud.r-project.org/')"

    - name: Build and test (Windows)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      env:
        ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
      run: |
        # export MAKEJ=8
        # export RTOOLS_HOME="$(ls -d /c/rtools* | head -n 1)"
        $env:MAKEJ="8"
        $env:RTOOLS_HOME="C:\rtools44"  
        Rcmd.exe INSTALL --build .
    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p dist
        mv *.zip *.tgz *.tar.gz dist/ 2>/dev/null || true
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: r-${{ matrix.os }}-${{ matrix.R }}
        path: dist/*

  deploy:
    needs: [R-build, R-build-win]

    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4