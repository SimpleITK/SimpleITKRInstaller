version: 2.1

parameters:
  run_monthly_testing:
    type: boolean
    default: false

executors:
  windows:
    machine:
      image: windows-server-2022-gui:current
    environment:
      RUNNER_OS: windows
    resource_class: windows.large

jobs:
  r-build:
    parameters:
      os:
        type: executor
      r-version:
        type: string
    executor: << parameters.os >>
    environment:
      ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    steps:
      - checkout
      - run:
          name: Install rig
          shell: powershell.exe
          command: |
            choco install rig -y
      - run:
          name: Install R << parameters.r-version >> (win)
          shell: powershell.exe
          command: |
            $R_VERSION = "<< parameters.r-version >>"
            rig add $R_VERSION
      - run:
          name: Install Rtools 
          command: |
            choco install rtools -y
workflows:
  r-build-test:
    jobs:
      - r-build:
          matrix:
            parameters:
              r-version: ['4.4.1']
              os: ["windows"]
          filters:
            branches:
              only:
                - release