version: 2.1

parameters:
  run_monthly_testing:
    type: boolean
    default: false

executors:
  windows:
    machine:
      image: windows-server-2022-gui:current
    environment:
      RUNNER_OS: windows
    resource_class: windows.large

jobs:
  r-build:
    parameters:
      os:
        type: executor
      r-version:
        type: string
    executor: << parameters.os >>
    environment:
      ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    steps:
      - checkout
      - run:
          name: Install R << parameters.r-version >>
          when: << parameters.os >> != "windows"
          shell: powershell.exe
          command: |
            R_VERSION="<< parameters.r-version >>"
            # Install rig, R Installation Manager (https://github.com/r-lib/rig) to control installed R version
            if [ "$RUNNER_OS" == "macos" ]; then
              brew tap r-lib/rig
              brew install --cask rig
              rig add $R_VERSION
            elif [ "$RUNNER_OS" == "linux" ]; then
              `which sudo` curl -L https://rig.r-pkg.org/deb/rig.gpg -o /etc/apt/trusted.gpg.d/rig.gpg
              `which sudo` sh -c 'echo "deb http://rig.r-pkg.org/deb rig main" > /etc/apt/sources.list.d/rig.list'
              `which sudo` apt update
              `which sudo` apt install r-rig
              sudo rig add $R_VERSION
            fi
      - run:
          name: Install R << parameters.r-version >> (win)
          when: << parameters.os >> == "windows"
          command: |
            choco install rig -y
            rig add $R_VERSION
workflows:
  r-build-test:
    jobs:
      - r-build:
          matrix:
            parameters:
              r-version: ['4.4.1']
              os: ["windows"]
          filters:
            branches:
              only:
                - release